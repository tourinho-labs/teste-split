  name: Debug secret
  on: workflow_dispatch
  jobs:
    check:
      runs-on: ubuntu-latest
      steps:
        - name: Tamanho do secret (sem expor valor)
          env:
            KEY: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          run: |
            echo "RELEASE_APP_ID (var): '${{ vars.RELEASE_APP_ID }}'"
            echo "RELEASE_APP_PRIVATE_KEY length: ${#KEY}"
